<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- Created with Inkscape (http://www.inkscape.org/) -->

<svg
   width="{{ chart.width }}"
   height="{{ chart.height }}"
   viewBox="-120 -120 240 240"
   version="1.1"
   id="svg5"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
<style>
    .trace {
      font-family: helvetica,arial,sans-serif;
      font-weight: lighter;
      font-size: 8px;
    }
    .value {
      font-family: helvetica,arial,sans-serif;
      font-weight: bolder;
      font-size: 14;
    }
    .chart_title {
      font: bold 12px sans-serif;
    }
    .label {
      font-size: 8px sans-serif;
      fill: white;
    }
</style>
  <defs
     id="defs2">
  </defs>

    <text x="0" y="-115"
        text-anchor="middle" 
        dominant-baseline="central"
        class="chart_title">
        {{ chart.title }}
    </text>

  <circle cx="0" cy="0" r="3" fill="lightgray" />

  <circle cx="0" cy="0" r="100" fill="none" stroke="lightgray" />
  <circle cx="0" cy="0" r="50" fill="none" stroke="lightgray" />
  

  {% for axis_name, x, y in coords %}
  <g>
    <path d="M 0 0 L {{ x }} {{ y }}" stroke="#D3D3D3" strokeWidth="4" />
    <circle cx="{{ x }}" cy="{{ y }}" r="8" stroke="#1c8bbd" fill="#1c8bbd" />
    <text x="{{ x }}" y="{{ y }}"
          text-anchor="middle" 
          dominant-baseline="central"
          class="label">{{ axis_name }}</text>
  </g>        
  {% endfor %}  
   

    {% for polygon in polygons %}
        {{ polygon|safe }}
    {% endfor %}

  <!--<path d="M 0 -50 v 100" stroke="silver" strokeWidth="1" />-->
  <!--<path d="M -50 0 h 100" stroke="silver" strokeWidth="1" />-->
  <!--<circle cx="0" cy="0" r="2" fill="navy" />-->

</svg>
