{% load comun_filters sistemas %}

<div class="card m-2">
  <div class="card-header bg-info">
      <h4 class="card-title">
          Observaciones
      </h4>
  </div>
  <div class="card-body">
      <p class="card-text">
      {{ sistema.observaciones|as_markdown }}
      </p>
  </div>
  <div class="card-footer d-flex flex-row-reverse">
      <a class="btn btn-warning"
         href="{% url 'sistemas:editar_observaciones' sistema=sistema.pk %}">
      <i class="bi bi-pencil"></i>
      Editar observaciones
      </a>
  </div>
</div>
