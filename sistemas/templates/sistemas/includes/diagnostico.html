{% if diagnostico.count > 0 %}
<table class="table">
  {% for sintoma in diagnostico.evaluaciones %}
    <tr>
        <td class="sintoma">{{ sintoma }}</td>  
    </tr>        
  {% endfor %}
  <tr>


  <td>
  <a href="#"
     class="btn btn-warning"
     title="Reevaluar diagnóstico">
     <i class="bi bi-check-all"></i>
     Reevaluar diagnóstico
  </a>
  </td>
</table>  

{% else %}
  <p class="lead">No se ha detectado ningún problema con este sistema</p>  
{% endif %}
