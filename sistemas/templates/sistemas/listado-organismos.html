{% extends "comun/base.html" %}
{% load comun_filters %}

{% block content %}

<table class="table table-striped">
  <tbody>
    {% for ente in entes %}<tr>
      <th>{{ ente.pk}}</th>  
      <td>
          <a href="{% url 'sistemas:detalle_organismo' organismo=ente.organismo %}">
          <b>
          {{ ente.organismo.nombre_organismo }}
          </b>
          </a>
      </td>
      <td>
          <span class="dir3">
            {{ ente.organismo.dir3 }}
          </span>    
      </td>
      <td colspan="2">
        {{ ente.organismo.categoria }}
      </td>
    </tr>{% endfor %}
  </tbody>
</table>  

{% endblock content %}
